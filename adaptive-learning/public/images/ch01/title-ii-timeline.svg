<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" role="img" aria-labelledby="tiiTitle tiiDesc">
  <title id="tiiTitle">ADA Title II Digital Accessibility Compliance Timeline</title>
  <desc id="tiiDesc">Three milestones on a horizontal timeline. April 24, 2024 — the U.S. Department of Justice published its final Title II web rule. April 24, 2026 — large public entities serving 50,000 or more people must comply. April 26, 2027 — smaller public entities must comply. The required standard is WCAG 2.1 Level AA.</desc>

  <rect width="900" height="360" fill="#FFFFFF"/>

  <text x="450" y="50" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#1F2937">ADA Title II Digital Accessibility Timeline</text>
  <text x="450" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6B7280">Required standard: WCAG 2.1 Level AA</text>

  <line x1="130" y1="190" x2="770" y2="190" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round"/>

  <g aria-hidden="true">
    <circle cx="160" cy="190" r="14" fill="#1E3A8A"/>
    <circle cx="160" cy="190" r="5" fill="#FFFFFF"/>
  </g>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1E3A8A">Apr 24, 2024</text>
  <text x="160" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F2937">Final rule published</text>
  <text x="160" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">U.S. Department of Justice</text>

  <g aria-hidden="true">
    <circle cx="450" cy="190" r="18" fill="#047857"/>
    <circle cx="450" cy="190" r="7" fill="#FFFFFF"/>
  </g>
  <text x="450" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#047857">Apr 24, 2026</text>
  <text x="450" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F2937">Large entities must comply</text>
  <text x="450" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">Population ≥ 50,000</text>

  <g aria-hidden="true">
    <circle cx="740" cy="190" r="18" fill="#B45309"/>
    <circle cx="740" cy="190" r="7" fill="#FFFFFF"/>
  </g>
  <text x="740" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#B45309">Apr 26, 2027</text>
  <text x="740" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1F2937">Small entities must comply</text>
  <text x="740" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">Population &lt; 50,000</text>

  <rect x="130" y="288" width="640" height="44" rx="6" fill="#F3F4F6"/>
  <text x="450" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#374151">Covers public websites, LMS content, documents, videos, and required third-party tools</text>
</svg>
