<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" role="img" aria-labelledby="altTitle altDesc">
  <title id="altTitle">Alt Text Decision Tree</title>
  <desc id="altDesc">A decision flowchart for writing alt text on images. Start by asking whether the image is purely decorative — if yes, mark it decorative or use empty alt text. Otherwise ask whether it is a functional image like a link or button — if yes, describe the action it performs. Otherwise ask whether it is a complex image like a chart or diagram — if yes, write a short alt plus a longer description nearby. Otherwise write concise alt text describing what the image shows.</desc>

  <rect width="900" height="640" fill="#FFFFFF"/>

  <text x="450" y="46" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#1F2937">Alt Text Decision Tree</text>
  <text x="450" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#6B7280">For every image in your course materials, ask these four questions in order</text>

  <!-- Q1: decorative? -->
  <rect x="310" y="100" width="280" height="66" rx="10" fill="#EFF6FF" stroke="#1E3A8A" stroke-width="2"/>
  <text x="450" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">1. Is it purely decorative?</text>
  <text x="450" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Borders, flourishes, background images</text>

  <!-- Yes arrow to result -->
  <line x1="310" y1="133" x2="210" y2="133" stroke="#047857" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="255" y="124" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#047857">Yes</text>
  <rect x="60" y="108" width="150" height="60" rx="10" fill="#ECFDF5" stroke="#047857" stroke-width="2"/>
  <text x="135" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#047857">alt=""</text>
  <text x="135" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">or "mark decorative"</text>

  <!-- No arrow down -->
  <line x1="450" y1="166" x2="450" y2="200" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="462" y="186" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">No</text>

  <!-- Q2: functional? -->
  <rect x="310" y="200" width="280" height="66" rx="10" fill="#EFF6FF" stroke="#1E3A8A" stroke-width="2"/>
  <text x="450" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">2. Is it functional?</text>
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#374151">A link, a button, or an icon control</text>

  <line x1="310" y1="233" x2="210" y2="233" stroke="#047857" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="255" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#047857">Yes</text>
  <rect x="60" y="208" width="150" height="60" rx="10" fill="#ECFDF5" stroke="#047857" stroke-width="2"/>
  <text x="135" y="231" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#047857">Describe the action</text>
  <text x="135" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">"Download syllabus"</text>

  <line x1="450" y1="266" x2="450" y2="300" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="462" y="286" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">No</text>

  <!-- Q3: complex? -->
  <rect x="310" y="300" width="280" height="66" rx="10" fill="#EFF6FF" stroke="#1E3A8A" stroke-width="2"/>
  <text x="450" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1E3A8A">3. Is it complex?</text>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Charts, diagrams, infographics, maps</text>

  <line x1="310" y1="333" x2="210" y2="333" stroke="#047857" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="255" y="324" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#047857">Yes</text>
  <rect x="60" y="308" width="150" height="60" rx="10" fill="#ECFDF5" stroke="#047857" stroke-width="2"/>
  <text x="135" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#047857">Short alt + long</text>
  <text x="135" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">description nearby</text>
  <text x="135" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">(caption or link)</text>

  <line x1="450" y1="366" x2="450" y2="400" stroke="#6B7280" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="462" y="386" font-family="system-ui, sans-serif" font-size="12" fill="#6B7280">No</text>

  <!-- Q4: informative -->
  <rect x="310" y="400" width="280" height="76" rx="10" fill="#F5F3FF" stroke="#6D28D9" stroke-width="2"/>
  <text x="450" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6D28D9">4. It's informative</text>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#374151">Write concise alt text (about 1 sentence)</text>
  <text x="450" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">Describe what matters for the learning context</text>

  <!-- Footer examples -->
  <rect x="60" y="505" width="780" height="108" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="80" y="530" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1F2937">Examples</text>
  <text x="80" y="554" font-family="system-ui, sans-serif" font-size="12" fill="#047857" font-weight="600">Good:</text>
  <text x="128" y="554" font-family="system-ui, sans-serif" font-size="12" fill="#374151">"Bar chart showing enrollment doubled from 2020 to 2025"</text>
  <text x="80" y="574" font-family="system-ui, sans-serif" font-size="12" fill="#047857" font-weight="600">Good:</text>
  <text x="128" y="574" font-family="system-ui, sans-serif" font-size="12" fill="#374151">"Photo of Professor Winchell" (instructor photo in syllabus)</text>
  <text x="80" y="594" font-family="system-ui, sans-serif" font-size="12" fill="#B91C1C" font-weight="600">Avoid:</text>
  <text x="128" y="594" font-family="system-ui, sans-serif" font-size="12" fill="#374151">"image," "photo," "picture," "graphic" — these add no information</text>

  <defs>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
